<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neural Network Visualization</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #020212; overflow: hidden; font-family: 'Courier New', monospace; }
    canvas { display: block; }
    #overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      display: flex; flex-direction: column;
      justify-content: space-between;
      padding: 32px 40px;
    }
    .top { display: flex; justify-content: space-between; align-items: flex-start; }
    .title-label {
      color: rgba(160,100,255,0.5);
      font-size: 10px; letter-spacing: 4px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .title-main {
      color: rgba(200,160,255,0.95);
      font-size: 32px; font-weight: 700;
      letter-spacing: 2px;
      text-shadow: 0 0 40px rgba(160,80,255,0.8), 0 0 80px rgba(100,60,255,0.4);
    }
    .title-sub {
      color: rgba(100,180,255,0.6);
      font-size: 11px; letter-spacing: 3px; margin-top: 6px;
    }
    .status { text-align: right; }
    .status-label { color: rgba(100,200,255,0.4); font-size: 9px; letter-spacing: 3px; }
    .status-val { color: rgba(80,255,160,0.9); font-size: 13px; letter-spacing: 2px; margin-top: 4px; }
    .bottom { display: flex; justify-content: space-between; align-items: flex-end; }
    .arch { color: rgba(120,80,255,0.5); font-size: 9px; letter-spacing: 3px; }
    .brand { color: rgba(160,80,255,0.4); font-size: 9px; letter-spacing: 2px; text-align: right; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="overlay">
  <div class="top">
    <div>
      <div class="title-label">Neural Architecture</div>
      <div class="title-main">DEEP NETWORK</div>
      <div class="title-sub">v4.1 · INFERENCE MODE · ACTIVE</div>
    </div>
    <div class="status">
      <div class="status-label">STATUS</div>
      <div class="status-val">● ONLINE</div>
    </div>
  </div>
  <div class="bottom">
    <div class="arch">INPUT [4] → HIDDEN [7→9→7→5] → OUTPUT [3]</div>
    <div class="brand">DATA SCIENCE × AI/ML</div>
  </div>
</div>

<script>
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    buildNetwork();
  }

  const layers = [4, 7, 9, 7, 5, 3];
  let nodes = [], connections = [], particles = [];

  function buildNetwork() {
    nodes = []; connections = [];
    const W = canvas.width, H = canvas.height;
    const layerSpacing = W / (layers.length + 1);

    layers.forEach((count, li) => {
      const x = layerSpacing * (li + 1);
      const nodeSpacing = H / (count + 1);
      for (let ni = 0; ni < count; ni++) {
        nodes.push({
          x, y: nodeSpacing * (ni + 1),
          layer: li, index: ni,
          phase: Math.random() * Math.PI * 2,
          speed: 0.4 + Math.random() * 0.6,
          radius: 5 + Math.random() * 4,
        });
      }
    });

    for (let li = 0; li < layers.length - 1; li++) {
      const A = nodes.filter(n => n.layer === li);
      const B = nodes.filter(n => n.layer === li + 1);
      A.forEach(a => B.forEach(b => {
        connections.push({
          a, b,
          phase: Math.random() * Math.PI * 2,
          speed: 0.3 + Math.random() * 0.5,
          weight: Math.random(),
        });
      }));
    }

    particles = Array.from({ length: 150 }, () => {
      const conn = connections[Math.floor(Math.random() * connections.length)];
      return { conn, t: Math.random(), speed: 0.002 + Math.random() * 0.005 };
    });
  }

  function draw(time) {
    const t = time * 0.001;

    ctx.fillStyle = 'rgba(2, 2, 18, 0.18)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Connections
    connections.forEach(({ a, b, phase, speed, weight }) => {
      const pulse = (Math.sin(t * speed * 2 + phase) + 1) / 2;
      const alpha = 0.04 + pulse * 0.12 * weight;
      const grad = ctx.createLinearGradient(a.x, a.y, b.x, b.y);
      grad.addColorStop(0, `rgba(100,60,255,${alpha})`);
      grad.addColorStop(0.5, `rgba(180,80,255,${alpha * 1.5})`);
      grad.addColorStop(1, `rgba(60,160,255,${alpha})`);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 0.5 + weight * 1gru.2;
      ctx.stroke();
    });

    // Particles
    particles.forEach(p => {
      p.t += p.speed;
      if (p.t > 1) {
        p.t = 0;
        p.conn = connections[Math.floor(Math.random() * connections.length)];
      }
      const { a, b } = p.conn;
      const px = a.x + (b.x - a.x) * p.t;
      const py = a.y + (b.y - a.y) * p.t;
      const fade = Math.sin(p.t * Math.PI);
      const grd = ctx.createRadialGradient(px, py, 0, px, py, 5);
      grd.addColorStop(0, `rgba(200,140,255,${0.9 * fade})`);
      grd.addColorStop(1, 'rgba(100,60,255,0)');
      ctx.beginPath();
      ctx.arc(px, py, 5, 0, Math.PI * 2);
      ctx.fillStyle = grd;
      ctx.fill();
    });

    // Nodes
    nodes.forEach(node => {
      const pulse = (Math.sin(t * node.speed + node.phase) + 1) / 2;
      const r = node.radius + pulse * 4;
      const glow = 12 + pulse * 20;
      const isInput = node.layer === 0;
      const isOutput = node.layer === layers.length - 1;
      const coreColor = isInput ? '120,80,255' : isOutput ? '60,200,255' : '160,80,255';

      const outerGrad = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, glow);
      outerGrad.addColorStop(0, `rgba(${coreColor},${0.3 + pulse * 0.3})`);
      outerGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.beginPath();
      ctx.arc(node.x, node.y, glow, 0, Math.PI * 2);
      ctx.fillStyle = outerGrad;
      ctx.fill();

      const coreGrad = ctx.createRadialGradient(node.x - r * 0.3, node.y - r * 0.3, 0, node.x, node.y, r);
      coreGrad.addColorStop(0, `rgba(230,200,255,${0.9 + pulse * 0.1})`);
      coreGrad.addColorStop(0.4, `rgba(${coreColor},0.9)`);
      coreGrad.addColorStop(1, `rgba(${coreColor},0.4)`);
      ctx.beginPath();
      ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
      ctx.fillStyle = coreGrad;
      ctx.fill();
    });

    // Scanlines
    for (let y = 0; y < canvas.height; y += 4) {
      ctx.fillStyle = 'rgba(0,0,0,0.025)';
      ctx.fillRect(0, y, canvas.width, 1);
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  resize();
  ctx.fillStyle = '#020212';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  requestAnimationFrame(draw);
</script>
</body>
</html>
